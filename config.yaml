# NATMap Go 版本配置文件

# 服务器配置
server:
  port: 8080
  mode: release  # debug 或 release

# 数据库配置
database:
  host: localhost
  port: 3306
  username: root
  password: "123456"
  dbname: natmap
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600  # 秒

# 缓存配置
cache:
  enabled: true
  ttl: 60  # 缓存过期时间（秒），最小 60 秒
  cleanup_interval: 120  # 清理间隔（秒）

# JWT 认证配置
jwt:
  secret: "natmap-secret-key-change-in-production"
  expire_hours: 24

# 日志配置
log:
  level: info  # debug, info, warn, error
  format: json  # json 或 console
